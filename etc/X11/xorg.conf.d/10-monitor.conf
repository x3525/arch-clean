# https://man.archlinux.org/man/xorg.conf.5
Section "ServerFlags"
        Option "BlankTime" "0"
        Option "DontVTSwitch" "false"
        Option "DontZap" "true"
        Option "IgnoreABI" "false"
        Option "OffTime" "0"
        Option "StandbyTime" "0"
        Option "SuspendTime" "0"
        Option "Xinerama" "false"
EndSection
Section "Extensions"
        Option "DPMS" "false"
EndSection
