include-directory = modules.d

[colors]
black = "#000000"
gray = "#1f1f1f"
purple = "#301934"
red = "#ff0000"
white = "#ffffff"

[global/wm]
margin-bottom = 0
margin-top = 0

[settings]
pseudo-transparency = false

[bar/x]
background = ${colors.purple}
bottom = false
click-middle = ~/.local/bin/scripts.d/rofi.sh drun
dpi-x = 0
dpi-y = 0
enable-ipc = true
enable-struts = true
fixed-center = true
font-0 = "MesloLGMDZNerdFontMono:style=Regular;size=12;0"
foreground = ${colors.white}
height = 50
module-margin = 1
modules-center = date
modules-left = i3
modules-right = ${env:MODULES_RIGHT}
monitor = ${env:MONITOR}
monitor-strict = true
override-redirect = false
padding = 0
radius = 0
width = 100%
wm-name = Polybar
