[module/menu]
expand-right = false
format = <menu><label-toggle>
format-background = ${colors.black}
label-close = MENU 󰅖
label-close-padding = 1
label-open = MENU 󰀻
label-open-padding = 1
label-separator = 󰇙
menu-0-0 = 󰑐
menu-0-0-exec = ~/.local/bin/scripts.d/restart.sh polybar
menu-0-0-padding = 1
menu-0-1 = RANDR
menu-0-1-exec = #menu.open.1
menu-0-1-padding = 1
menu-0-2 = POWER
menu-0-2-exec = #menu.open.2
menu-0-2-padding = 1
menu-1-0 = Remove
menu-1-0-exec = ~/.local/bin/scripts.d/randr.sh remove
menu-1-0-padding = 1
menu-1-1 = Load
menu-1-1-exec = ~/.local/bin/scripts.d/randr.sh load
menu-1-1-padding = 1
menu-1-2 = Save
menu-1-2-exec = ~/.local/bin/scripts.d/randr.sh save
menu-1-2-padding = 1
menu-1-3 = ARandR
menu-1-3-exec = arandr
menu-1-3-padding = 1
menu-2-0 = Lock
