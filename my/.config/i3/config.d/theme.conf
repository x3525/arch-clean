font pango:NotoSans Mono Regular 12

for_window [class=".*"] title_format "%title"
title_align center

hide_edge_borders vertical
default_border pixel 5
default_floating_border normal 5

# Class                  Border  Background Text    Indicator Child_Border
client.focused           #000000 #000000    #ffffff #000000   #000000
client.focused_inactive  #1f1f1f #1f1f1f    #000000 #1f1f1f   #1f1f1f
client.focused_tab_title #000000 #000000    #ffffff
client.unfocused         #1f1f1f #1f1f1f    #000000 #1f1f1f   #1f1f1f
client.urgent            #ff0000 #ff0000    #000000 #ff0000   #ff0000
