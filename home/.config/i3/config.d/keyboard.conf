floating_modifier Mod4

bindsym XF86MonBrightnessDown exec --no-startup-id brightnessctl set 20%-
bindsym XF86MonBrightnessUp exec --no-startup-id brightnessctl set 20%+

bindsym XF86AudioPlay exec --no-startup-id playerctl --all-players play-pause
bindsym XF86AudioStop exec --no-startup-id playerctl --all-players stop
bindsym XF86AudioPrev exec --no-startup-id playerctl --all-players previous
bindsym XF86AudioNext exec --no-startup-id playerctl --all-players next

bindsym XF86AudioMute exec --no-startup-id ~/bin/notify.sh audio t
bindsym XF86AudioLowerVolume exec --no-startup-id ~/bin/notify.sh audio d
bindsym XF86AudioRaiseVolume exec --no-startup-id ~/bin/notify.sh audio i

bindsym XF86TouchpadOn exec --no-startup-id ~/bin/notify.sh touchpad enable
bindsym XF86TouchpadOff exec --no-startup-id ~/bin/notify.sh touchpad disable

bindsym Mod4+Left focus left
bindsym Mod4+Right focus right
bindsym Mod4+Up focus up
bindsym Mod4+Down focus down

bindsym Mod4+Shift+Left move left
bindsym Mod4+Shift+Right move right
bindsym Mod4+Shift+Up move up
bindsym Mod4+Shift+Down move down

bindsym Mod4+h split h
bindsym Mod4+v split v
bindsym Mod4+f fullscreen toggle

bindsym Mod4+s layout stacking
bindsym Mod4+t layout tabbed
bindsym Mod4+n layout toggle split

bindsym Mod4+space focus mode_toggle
bindsym Mod4+Shift+space floating toggle
bindsym Mod4+Shift+Control+space sticky toggle

bindsym Mod4+minus scratchpad show
bindsym Mod4+Shift+minus move scratchpad

bindsym Mod4+p focus parent
bindsym Mod4+c focus child

set $ws1 1
set $ws2 2
set $ws3 3
set $ws4 4
set $ws5 5
set $ws6 6
set $ws7 7
set $ws8 8
set $ws9 9

bindsym Mod4+1 workspace number $ws1
bindsym Mod4+2 workspace number $ws2
bindsym Mod4+3 workspace number $ws3
bindsym Mod4+4 workspace number $ws4
bindsym Mod4+5 workspace number $ws5
bindsym Mod4+6 workspace number $ws6
bindsym Mod4+7 workspace number $ws7
bindsym Mod4+8 workspace number $ws8
bindsym Mod4+9 workspace number $ws9

bindsym Mod4+Shift+1 move container to workspace number $ws1
bindsym Mod4+Shift+2 move container to workspace number $ws2
bindsym Mod4+Shift+3 move container to workspace number $ws3
bindsym Mod4+Shift+4 move container to workspace number $ws4
bindsym Mod4+Shift+5 move container to workspace number $ws5
bindsym Mod4+Shift+6 move container to workspace number $ws6
bindsym Mod4+Shift+7 move container to workspace number $ws7
bindsym Mod4+Shift+8 move container to workspace number $ws8
bindsym Mod4+Shift+9 move container to workspace number $ws9

bindsym Mod4+Shift+r reload
bindsym Mod4+Shift+Control+r restart

bindsym Mod4+Shift+q kill

bindsym Mod4+F1 bar mode toggle

# Screenshot
bindsym Print exec --no-startup-id flameshot launcher

# Screen locker
bindsym Mod4+l exec --no-startup-id loginctl lock-session

# File manager
bindsym Mod4+e exec --no-startup-id thunar

# Terminal emulator
bindsym Mod4+Return exec --no-startup-id alacritty --config-file ~/.config/alacritty/alacritty.toml

# Application launcher
bindsym --release Mod4+d exec --no-startup-id rofi -no-lazy-grab -config ~/.config/rofi/config.rasi -show drun

mode "RESIZE" {
    bindsym Left resize shrink width 50px
    bindsym Right resize grow width 50px
    bindsym Up resize grow height 50px
    bindsym Down resize shrink height 50px

    bindsym Return mode "default"
    bindsym Escape mode "default"

    bindsym Mod4+r mode "default"
}
    bindsym Mod4+r mode "RESIZE"
